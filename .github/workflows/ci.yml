name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-pm-data-tools:
    name: pm-data-tools tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "packages/pm-data-tools[dev]"
      - name: Lint
        run: ruff check packages/pm-data-tools/
      - name: Test
        run: pytest packages/pm-data-tools/tests/ -v --tb=short

  test-agent-task-planning:
    name: agent-task-planning tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "packages/agent-task-planning" pytest pytest-asyncio pytest-cov ruff
      - name: Lint
        run: ruff check packages/agent-task-planning/
      - name: Test
        run: pytest packages/agent-task-planning/tests/ -v --tb=short

  test-pm-mcp-servers:
    name: pm-mcp-servers tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pm-data-tools first
        run: pip install -e "packages/pm-data-tools"
      - name: Install pm-mcp-servers
        run: pip install -e "packages/pm-mcp-servers[dev]" ruff
      - name: Lint
        run: ruff check packages/pm-mcp-servers/
      - name: Test
        run: pytest packages/pm-mcp-servers/tests/ -v --tb=short
