name: Bug Report
description: Report a bug in pda-platform
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of the bug.
      placeholder: e.g. "pm-data-tools crashes when parsing an empty MSPDI file"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - pm-data-tools
        - agent-task-planning
        - pm-mcp-servers
        - Multiple / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: e.g. 0.2.0
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.4
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps that trigger the bug.
      placeholder: |
        1. Install pm-data-tools 0.2.0
        2. Run `from pm_data_tools import ...`
        3. Call `...` with `...`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: Include the full error message and traceback if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (OS, environment, sample file, etc.)
