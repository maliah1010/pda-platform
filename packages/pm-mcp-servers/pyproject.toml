[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pm-mcp-servers"
version = "1.1.0"
description = "99 MCP tools across 14 modules for UK government IPA Gate Review assurance. Risk registers, earned value, benefits realisation, gate readiness, portfolio analysis, and IPA benchmark data."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Ant Newman", email = "antjsnewman@outlook.com"},
]
maintainers = [
    {name = "Ant Newman", email = "antjsnewman@outlook.com"},
]
keywords = [
    "mcp",
    "model-context-protocol",
    "claude",
    "ai",
    "project-management",
    "assurance",
    "ipa",
    "nista",
    "gmpp",
    "gate-readiness",
    "risk-register",
    "earned-value",
    "benefits-realisation",
    "uk-government",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Other Audience",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Office/Business :: Scheduling",
]

dependencies = [
    "mcp>=0.9.0",
    "pm-data-tools>=1.1.0",
    "uvicorn>=0.20.0",
    "starlette>=0.27.0",
    "anthropic>=0.18.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "mypy>=1.0",
    "httpx>=0.25.0",
]

[project.urls]
Homepage = "https://github.com/antnewman/pda-platform"
Documentation = "https://github.com/antnewman/pda-platform/tree/main/docs"
Repository = "https://github.com/antnewman/pda-platform"
Issues = "https://github.com/antnewman/pda-platform/issues"
Changelog = "https://github.com/antnewman/pda-platform/releases"

[project.scripts]
pm-data-server = "pm_mcp_servers.pm_data.server:main"
pm-validate-server = "pm_mcp_servers.pm_validate.server:main"
pm-analyse-server = "pm_mcp_servers.pm_analyse.server:main"
pm-nista-server = "pm_mcp_servers.pm_nista.server:main"
pm-assure-server = "pm_mcp_servers.pm_assure.server:main"
pm-knowledge-server = "pm_mcp_servers.pm_knowledge.server:main"
pda-platform-server = "pm_mcp_servers.pda_platform.server:main"
pda-platform-remote = "pm_mcp_servers.pda_platform.remote:main"

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "E722"]
