[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pda-platform"
version = "1.0.0"
description = "AI-powered project delivery assurance for UK government. 89 MCP tools covering schedule analysis, risk registers, financial tracking, gate readiness, benefits realisation, and more."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Ant Newman", email = "antjsnewman@outlook.com"},
]
maintainers = [
    {name = "Ant Newman", email = "antjsnewman@outlook.com"},
]
keywords = [
    "mcp",
    "model-context-protocol",
    "claude",
    "ai",
    "project-management",
    "assurance",
    "ipa",
    "nista",
    "gmpp",
    "gate-readiness",
    "risk-register",
    "earned-value",
    "benefits-realisation",
    "uk-government",
    "project-delivery",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Other Audience",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Office/Business :: Scheduling",
]

# Meta-package: depends on all three constituent packages.
# Installing pda-platform pulls in everything needed to run the
# unified 89-tool MCP server.
dependencies = [
    "agent-task-planning>=0.2.0",
    "pm-data-tools>=0.2.0",
    "pm-mcp-servers>=0.3.0",
]

[project.optional-dependencies]
# Full install including AI mining and optional LLM clients
full = [
    "agent-task-planning[mining,anthropic]>=1.0.0",
    "pm-data-tools[all]>=1.0.0",
    "pm-mcp-servers>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/antnewman/pda-platform"
Documentation = "https://github.com/antnewman/pda-platform/tree/main/docs"
Repository = "https://github.com/antnewman/pda-platform"
Issues = "https://github.com/antnewman/pda-platform/issues"
Changelog = "https://github.com/antnewman/pda-platform/releases"

[tool.hatch.build.targets.wheel]
# Meta-package has no source code — the wheel contains only metadata.
packages = []
