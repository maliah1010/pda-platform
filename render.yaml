services:
  - type: web
    name: pda-platform
    runtime: python
    pythonVersion: "3.11"
    buildCommand: >
      pip install -e packages/pm-data-tools &&
      pip install -e packages/agent-task-planning &&
      pip install -e packages/pm-mcp-servers
    startCommand: pda-platform-remote
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
