[build]
builder = "NIXPACKS"

[deploy]
startCommand = "pip install -e packages/pm-data-tools && pip install -e packages/pm-api && uvicorn pm_api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
